apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: fix-order-routing
  title: FIX Order Routing System
  description: High-criticality order routing system for capital markets using FIX 4.4 protocol
  tags:
    - capital-markets
    - order-routing
    - fix-protocol
    - high-criticality
    - dotnet8
  links:
    - url: https://github.com/example/fix-order-routing-sample
      title: Repository
      icon: github

spec:
  type: system
  owner: trading-infrastructure
  lifecycle: production

  providesApis:
    - order-generator-api

  dependsOn:
    - postgresql
    - redis
    - keycloak
    - jaeger

---

apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: order-generator-api
  title: Order Generator API
  description: REST API for order submission and management

spec:
  type: openapi
  owner: trading-infrastructure
  lifecycle: production
  definition:
    $text: ./openapi.yaml

---

apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: postgresql-db
  title: PostgreSQL Database
  description: Primary datastore for orders and events

spec:
  type: database
  owner: trading-infrastructure
  system: fix-order-routing

---

apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: redis-cache
  title: Redis Cache
  description: Distributed cache for token and data caching

spec:
  type: cache
  owner: trading-infrastructure
  system: fix-order-routing

---

apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: jaeger-apm
  title: Jaeger APM
  description: Distributed tracing and observability platform

spec:
  type: monitoring
  owner: trading-infrastructure
  system: fix-order-routing
