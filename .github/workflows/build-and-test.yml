name: Build and Test

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '8.0'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Clear dotnet cache
      run: |
        rm -rf ~/.dotnet
        rm -rf ~/.nuget
      continue-on-error: true

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore FixOrderRouting.sln

    - name: Build
      run: dotnet build FixOrderRouting.sln --configuration Release --no-restore

  unit-tests:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Clear dotnet cache
      run: |
        rm -rf ~/.dotnet
        rm -rf ~/.nuget
      continue-on-error: true

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore FixOrderRouting.sln

    - name: Run Unit Tests - OrderGenerator
      run: dotnet test tests/OrderGenerator.UnitTests/OrderGenerator.UnitTests.csproj --configuration Release --no-restore

    - name: Run Unit Tests - OrderAccumulator
      run: dotnet test tests/OrderAccumulator.UnitTests/OrderAccumulator.UnitTests.csproj --configuration Release --no-restore

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: unit-test-results
        path: '**/TestResults/'

  integration-tests:
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: fixorderrouting
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Clear dotnet cache
      run: |
        rm -rf ~/.dotnet
        rm -rf ~/.nuget
      continue-on-error: true

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore FixOrderRouting.sln

    - name: Run Integration Tests - OrderGenerator
      run: dotnet test tests/OrderGenerator.IntegrationTests/OrderGenerator.IntegrationTests.csproj --configuration Release --no-restore
      env:
        ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=fixorderrouting;Username=postgres;Password=postgres"

    - name: Run Integration Tests - OrderAccumulator
      run: dotnet test tests/OrderAccumulator.IntegrationTests/OrderAccumulator.IntegrationTests.csproj --configuration Release --no-restore
      env:
        ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=fixorderrouting;Username=postgres;Password=postgres"

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: integration-test-results
        path: '**/TestResults/'

