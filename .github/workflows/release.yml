name: Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

env:
  DOTNET_VERSION: '8.0'
  REGISTRY: ghcr.io

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore FixOrderRouting.sln

    - name: Build Release
      run: dotnet build FixOrderRouting.sln --configuration Release --no-restore

    - name: Publish OrderGenerator API
      run: dotnet publish src/OrderGenerator.Api/OrderGenerator.Api.csproj --configuration Release --output ./publish/order-generator

    - name: Publish OrderAccumulator Worker
      run: dotnet publish src/OrderAccumulator.Worker/OrderAccumulator.Worker.csproj --configuration Release --output ./publish/order-accumulator

    - name: Create Release Artifacts
      run: |
        mkdir -p ./artifacts
        cd ./publish
        tar -czf ../artifacts/order-generator-api.tar.gz order-generator/
        tar -czf ../artifacts/order-accumulator-worker.tar.gz order-accumulator/
        cd ..

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/order-generator-api.tar.gz
          artifacts/order-accumulator-worker.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: release-artifacts
        path: artifacts/

  docker-build:
    runs-on: ubuntu-latest
    needs: create-release

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push OrderGenerator API
      uses: docker/build-push-action@v5
      with:
        context: .
        file: .docker/Dockerfile.generator
        push: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
        tags: |
          ${{ env.REGISTRY }}/${{ github.repository }}/order-generator:latest
          ${{ env.REGISTRY }}/${{ github.repository }}/order-generator:${{ github.sha }}

    - name: Build and push OrderAccumulator Worker
      uses: docker/build-push-action@v5
      with:
        context: .
        file: .docker/Dockerfile.accumulator
        push: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
        tags: |
          ${{ env.REGISTRY }}/${{ github.repository }}/order-accumulator:latest
          ${{ env.REGISTRY }}/${{ github.repository }}/order-accumulator:${{ github.sha }}
