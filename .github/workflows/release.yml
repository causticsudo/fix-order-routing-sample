name: Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

env:
  DOTNET_VERSION: '8.0'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Clear dotnet cache
      run: |
        rm -rf ~/.dotnet
        rm -rf ~/.nuget
      continue-on-error: true

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore FixOrderRouting.sln

    - name: Build Release
      run: dotnet build FixOrderRouting.sln --configuration Release --no-restore

    - name: Publish OrderGenerator API
      run: dotnet publish src/OrderGenerator.Api/OrderGenerator.Api.csproj --configuration Release --output ./publish/order-generator

    - name: Publish OrderAccumulator Worker
      run: dotnet publish src/OrderAccumulator.Worker/OrderAccumulator.Worker.csproj --configuration Release --output ./publish/order-accumulator

    - name: Create Release Artifacts
      run: |
        mkdir -p ./release-files
        cd ./publish
        tar -czf ../release-files/order-generator-api.tar.gz order-generator/
        tar -czf ../release-files/order-accumulator-worker.tar.gz order-accumulator/
        cd ..
        cp .docker/docker-compose.yml release-files/
        cp .docker/Dockerfile.generator release-files/
        cp .docker/Dockerfile.accumulator release-files/
        cp .env.example release-files/.env

    - name: Generate Release Tag
      if: github.ref == 'refs/heads/main'
      id: tag
      run: |
        TAG="v$(date +%Y%m%d)-$(git rev-parse --short HEAD)"
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "Generated tag: $TAG"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.tag.outputs.tag || github.ref_name }}
        files: |
          release-files/order-generator-api.tar.gz
          release-files/order-accumulator-worker.tar.gz
          release-files/docker-compose.yml
          release-files/Dockerfile.generator
          release-files/Dockerfile.accumulator
          release-files/.env
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-artifacts
        path: release-files/
